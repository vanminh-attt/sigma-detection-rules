title: PowerShell Download Cradle in ScriptBlock
id: 1e2f3a4b-5555-4666-c777-d88889999aaa
status: test
description: Phat hien script PowerShell tai va thuc thi code tu Internet (qua ScriptBlock Logging - Event 4104)
references:
    - https://attack.mitre.org/techniques/T1059/001/
author: Purple Team Lab
date: 2026-07-08
tags:
    - attack.execution
    - attack.t1059.001
logsource:
    product: windows
    category: ps_script
    definition: 'Requirements: Script Block Logging must be enabled'
detection:
    selection_download:
        ScriptBlockText|contains:
            - 'Net.WebClient'
            - 'DownloadString'
            - 'DownloadFile'
            - 'Invoke-WebRequest'
            - 'iwr '
            - 'curl '
    selection_exec:
        ScriptBlockText|contains:
            - 'IEX'
            - 'Invoke-Expression'
    condition: selection_download and selection_exec
falsepositives:
    - Script cai dat phan mem hop le (choco, scoop)
level: high
